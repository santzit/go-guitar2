[package]
name    = "godot_rocksmith"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
godot      = { git = "https://github.com/godot-rust/gdext", branch = "master", features = ["api-4-4"] }
# .NET CLR hosting — loads RocksmithBridge.dll via load_assembly_and_get_function_pointer.
# No NativeAOT, no shim DLL — the CLR is hosted in-process.
netcorehost = { version = "0.20", default-features = false, features = ["net10_0", "utils"] }
