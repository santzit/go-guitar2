name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.4.1-stable
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libvorbis-dev \
            libogg-dev \
            xvfb \
            mesa-vulkan-drivers \
            libgl1-mesa-dri \
            libgles2 \
            unzip

      - name: Download and install Godot
        run: |
          set +e
          
          # Explicitly set version - use env var or hardcoded fallback
          GODOT_VER="${{ env.GODOT_VERSION }}"
          if [ -z "$GODOT_VER" ]; then
            GODOT_VER="4.4.1-stable"
          fi
          
          GODOT_ZIP="Godot_v${GODOT_VER}_linux.x86_64.zip"
          GODOT_EXE="Godot_v${GODOT_VER}_linux.x86_64"
          GODOT_DIR="$RUNNER_TEMP/godot"
          GODOT_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VER}/${GODOT_ZIP}"
          
          echo "Downloading Godot version: $GODOT_VER"
          echo "URL: $GODOT_URL"
          
          mkdir -p "$GODOT_DIR"
          DOWNLOAD_OK=0
          
          if wget --tries=3 --timeout=60 -O "$GODOT_DIR/$GODOT_ZIP" "$GODOT_URL" 2>/dev/null; then
            DOWNLOAD_OK=1
          fi
          
          if [ "$DOWNLOAD_OK" -ne 1 ]; then
            echo "wget failed, trying curl..."
            if curl --fail --location --retry 3 --retry-delay 5 \
              -o "$GODOT_DIR/$GODOT_ZIP" "$GODOT_URL" 2>/dev/null; then
              DOWNLOAD_OK=1
            fi
          fi
          
          if [ "$DOWNLOAD_OK" -ne 1 ]; then
            echo "::warning::Failed to download Godot archive from $GODOT_URL; continuing without preinstalled Godot"
            if command -v godot >/dev/null 2>&1; then
              echo "GODOT_BIN=$(command -v godot)" >> "$GITHUB_ENV"
            fi
            exit 0
          fi
          
          if ! unzip -tq "$GODOT_DIR/$GODOT_ZIP" 2>/dev/null; then
            echo "::warning::Godot archive integrity check failed; continuing without preinstalled Godot"
            exit 0
          fi
          
          if ! unzip -q "$GODOT_DIR/$GODOT_ZIP" -d "$GODOT_DIR" 2>/dev/null; then
            echo "::warning::Failed to extract Godot archive; continuing without preinstalled Godot"
            exit 0
          fi
          
          chmod +x "$GODOT_DIR/$GODOT_EXE" 2>/dev/null
          
          if [ -f "$GODOT_DIR/$GODOT_EXE" ]; then
            sudo ln -sf "$GODOT_DIR/$GODOT_EXE" /usr/local/bin/godot
            ln -sf "$GODOT_DIR/$GODOT_EXE" "$GITHUB_WORKSPACE/$GODOT_EXE"
            echo "GODOT_BIN=$GODOT_DIR/$GODOT_EXE" >> "$GITHUB_ENV"
            echo "PATH=$GODOT_DIR:$PATH" >> "$GITHUB_ENV"
            echo "Successfully installed Godot $GODOT_VER"
          else
            echo "::warning::Godot executable not found after extraction"
            echo "Contents of $GODOT_DIR:"
            ls -la "$GODOT_DIR" 2>/dev/null || true
          fi
          
          exit 0
