name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libvorbis-dev \
            libogg-dev \
            xvfb \
            mesa-vulkan-drivers \
            libgl1-mesa-dri \
            libgles2 \
            unzip

      - name: Download Godot 4.4.1
        run: |
          GODOT_VERSION="4.4.1-stable"
          GODOT_ZIP="Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          GODOT_EXE="Godot_v${GODOT_VERSION}_linux.x86_64"
          GODOT_DIR="$RUNNER_TEMP/godot"

          mkdir -p "$GODOT_DIR"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${GODOT_ZIP}"
          unzip -q "$GODOT_ZIP" -d "$GODOT_DIR"
          chmod +x "$GODOT_DIR/$GODOT_EXE"

          sudo ln -sf "$GODOT_DIR/$GODOT_EXE" /usr/local/bin/godot
          ln -sf "$GODOT_DIR/$GODOT_EXE" "$GITHUB_WORKSPACE/$GODOT_EXE"

          echo "GODOT_BIN=$GODOT_DIR/$GODOT_EXE" >> "$GITHUB_ENV"
          echo "PATH=$GODOT_DIR:$PATH" >> "$GITHUB_ENV"
          godot --version
