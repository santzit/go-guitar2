name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.4.1-stable
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libvorbis-dev \
            libogg-dev \
            xvfb \
            mesa-vulkan-drivers \
            libgl1-mesa-dri \
            libgles2 \
            unzip

      - name: Download and install Godot
        run: |
          GODOT_VERSION="${GODOT_VERSION:-4.4.1-stable}"
          GODOT_ZIP="Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          GODOT_EXE="Godot_v${GODOT_VERSION}_linux.x86_64"
          GODOT_DIR="$RUNNER_TEMP/godot"
          GODOT_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/${GODOT_ZIP}"

          mkdir -p "$GODOT_DIR"
          if ! wget --tries=3 --timeout=30 -O "$GODOT_DIR/$GODOT_ZIP" "$GODOT_URL"; then
            echo "Failed to download Godot archive"
            exit 1
          fi
          if ! unzip -tq "$GODOT_DIR/$GODOT_ZIP"; then
            echo "Godot archive integrity check failed"
            exit 1
          fi
          if ! unzip -q "$GODOT_DIR/$GODOT_ZIP" -d "$GODOT_DIR"; then
            echo "Failed to extract Godot archive"
            exit 1
          fi
          chmod +x "$GODOT_DIR/$GODOT_EXE"

          sudo ln -sf "$GODOT_DIR/$GODOT_EXE" /usr/local/bin/godot
          ln -sf "$GODOT_DIR/$GODOT_EXE" "$GITHUB_WORKSPACE/$GODOT_EXE"

          echo "GODOT_BIN=$GODOT_DIR/$GODOT_EXE" >> "$GITHUB_ENV"
          echo "PATH=$GODOT_DIR:$PATH" >> "$GITHUB_ENV"
          # Godot --version outputs e.g. "4.4.1.stable.official.49a5bc7b6"
          # GODOT_VERSION uses hyphens (e.g. "4.4.1-stable"); normalise to dots for comparison
          GODOT_VER_CHECK="${GODOT_VERSION//-/.}"
          GODOT_BIN_VERSION="$("$GODOT_DIR/$GODOT_EXE" --version)"
          GODOT_WS_VERSION="$("$GITHUB_WORKSPACE/$GODOT_EXE" --version)"
          GODOT_PATH_VERSION="$(godot --version)"
          if [[ "$GODOT_BIN_VERSION" != *"$GODOT_VER_CHECK"* ]]; then
            echo "GODOT_BIN version mismatch: $GODOT_BIN_VERSION"
            exit 1
          fi
          if [[ "$GODOT_WS_VERSION" != *"$GODOT_VER_CHECK"* ]]; then
            echo "Workspace symlink version mismatch: $GODOT_WS_VERSION"
            exit 1
          fi
          if [[ "$GODOT_PATH_VERSION" != *"$GODOT_VER_CHECK"* ]]; then
            echo "PATH symlink version mismatch: $GODOT_PATH_VERSION"
            exit 1
          fi
