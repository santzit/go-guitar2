name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libvorbis-dev \
            libogg-dev \
            xvfb \
            mesa-vulkan-drivers \
            libgl1-mesa-dri \
            libgles2 \
            unzip

      - name: Download Godot 4.4.1
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.4.1-stable/Godot_v4.4.1-stable_linux.x86_64.zip
          unzip -q Godot_v4.4.1-stable_linux.x86_64.zip
          chmod +x Godot_v4.4.1-stable_linux.x86_64
          sudo mv Godot_v4.4.1-stable_linux.x86_64 /usr/local/bin/godot
          godot --version
